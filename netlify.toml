[build]
  functions = "netlify/functions"

  [[redirects]]
    from = "/api/claude"
      to = "/.netlify/functions/claude"
        status = 200

        [[redirects]]
          from = "/api/create-payment"
            to = "/.netlify/functions/create-payment"
              status = 200

              [[headers]]
                for = "/*"
                  [headers.values]
                      X-Frame-Options = "DENY"
                          X-Content-Type-Options = "nosniff"
